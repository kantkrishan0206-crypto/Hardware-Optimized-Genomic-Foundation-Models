tokenizer:
  strategy: "kmer"
  k: 3
  max_length: 4096

model:
  vocab_size: 134
  hidden_size: 128
  num_layers: 4
  num_heads: 4
  intermediate_size: 512
  max_position_embeddings: 1048576
  attention_backend: "performer"
  performer_features: 64
  dropout: 0.1

peft:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "query"
    - "key"
    - "value"
    - "dense"

training:
  seed: 13
  batch_size: 8
  gradient_accumulation_steps: 16
  learning_rate: 0.0002
  epochs: 3
  gradient_checkpointing: true
  mixed_precision: false
  checkpoint_dir: "checkpoints/promoter"
