model:
  base_model: "LongSafari/hyenadna-small-32k-seqlen-hf"
  max_sequence_length: 1048576
  tokenizer_alphabet: "ACGTN"
  attention_backend: "linear"

peft:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "query"
    - "key"
    - "value"
    - "dense"

training:
  micro_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 0.0002
  warmup_steps: 100
  max_steps: 1000
  bf16: true
