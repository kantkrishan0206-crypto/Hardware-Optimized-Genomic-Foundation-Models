apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: hogfm-api
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/gpu: "1"
    spec:
      containers:
        - image: ghcr.io/kantkrishan0206-crypto/hogfm-api:latest
          ports:
            - containerPort: 8000
          resources:
            limits:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "1"
