name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cpu-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install CPU dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints.txt -r requirements-dev.txt
          python -m pip install -e .
      - name: Lint
        run: ruff check .
      - name: CPU tests
        run: pytest -m "not gpu"
      - name: Package build
        run: python -m build
