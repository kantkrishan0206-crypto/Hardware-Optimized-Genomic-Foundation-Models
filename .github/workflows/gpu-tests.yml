name: gpu-tests

on:
  workflow_dispatch:

jobs:
  gpu-validation:
    runs-on: [self-hosted, linux, x64, cuda]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install GPU dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints.txt -r requirements-gpu.txt
          python -m pip install -e .
      - name: GPU tests
        run: pytest -m gpu
      - name: GPU profiling smoke
        run: python scripts/profile_gpu.py --tokens 256 --heads 2 --dim 32 --steps 1
