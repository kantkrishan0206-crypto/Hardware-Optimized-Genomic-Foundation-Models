image:
  repository: ghcr.io/kantkrishan0206-crypto/hogfm-api
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: "1"
    memory: 2Gi
  limits:
    cpu: "4"
    memory: 16Gi

gpu:
  enabled: false
  count: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

env:
  HOGFM_CHECKPOINT: /models/model.safetensors
